<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src  'self';
      style-src   'self';
      img-src     'self';
      media-src   'self';
      connect-src 'self';
      object-src  'none';
      frame-src   'none';
    " />
    <title>Pepper Weather</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Background -->
    <div class="bg-static"></div>
    <video id="bg-video" class="bg-video" autoplay loop muted playsinline>
      <source id="bg-video-src" src="" type="video/mp4" />
    </video>
    <div class="overlay"></div>

    <!-- Main Content -->
    <main class="container">
      <div class="brand">
        <h1 class="brand-title">
          <span class="brand-pepper">pepper</span
          ><span class="brand-weather">weather</span>
        </h1>
        <img src="public/images/logo.png" alt="Pepper Weather" class="logo" />
      </div>

      <section class="search-section">
        <div class="search-wrapper">
          <input
            type="text"
            id="search-input"
            placeholder="Search for a city..."
            autocomplete="off"
            spellcheck="false"
          />
          <button id="search-btn" aria-label="Search">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </button>
        </div>
        <ul id="autocomplete-list" class="autocomplete-list hidden"></ul>
      </section>

      <section id="weather-info" class="weather-info hidden" aria-live="polite">
        <div class="weather-main">
          <p id="city-name" class="city-name"></p>
          <div class="temp-row">
            <div class="temp-left">
              <img id="weather-icon" class="weather-icon hidden" alt="" />
            </div>
            <span id="temperature" class="temperature"></span>
            <span class="unit">°C</span>
          </div>
          <p id="description" class="description"></p>
        </div>

        <div class="weather-cards">
          <div class="card">
            <img
              src="public/svg/cards/humidity.svg"
              alt="Humidity"
              class="card-icon"
            />
            <span class="card-label">Humidity</span>
            <span id="humidity" class="card-value"></span>
          </div>
          <div class="card">
            <img src="public/svg/cards/wind.svg" alt="Wind" class="card-icon" />
            <span class="card-label">Wind</span>
            <span id="wind" class="card-value"></span>
          </div>
          <div class="card">
            <img
              src="public/svg/cards/pressure.svg"
              alt="Pressure"
              class="card-icon"
            />
            <span class="card-label">Pressure</span>
            <span id="pressure" class="card-value"></span>
          </div>
        </div>
      </section>

      <div id="error-msg" class="error-msg hidden"></div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
